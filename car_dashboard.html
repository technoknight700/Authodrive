<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Driver Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />

  <style>
    :root {
      --main-bg-color: #1976d2;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: url("https://media.istockphoto.com/id/1197889687/photo/traffic-lights-and-wet-road-at-night.jpg?s=612x612&w=0&k=20&c=LkMFqkOWmw3JeO4arD4R2SX_hPDpF5FuMqVKHrfIXqI=") no-repeat center center fixed;
      background-size: cover;
      color: #fff;
    }

    h3 {
      text-align: center;
      color: #ffffff;
      margin: 20px 0;
      font-weight: 600;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.7);
    }

    .table-container {
      padding: 20px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(4px);
      border-radius: 10px;
      overflow: hidden;
      font-size: 14px;
      color: #e3f2fd;
    }

    th,
    td {
      padding: 12px 15px;
      text-align: left;
      white-space: nowrap;
    }

    th {
      background-color: rgba(25, 118, 210, 0.9);
      color: #fff;
    }

    tr:nth-child(even) {
      background-color: rgba(255, 255, 255, 0.08);
    }

    tr:hover {
      background-color: rgba(25, 118, 210, 0.3);
    }

    .action-btn {
      padding: 8px 12px;
      background-color: #b71c1c; /* Red for delete */
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
    }

    .action-btn:hover {
      background-color: #7f0000;
    }
  </style>
</head>
<body>
  <div class="table-container">
    <h3>Active Drivers</h3>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>License No</th>
          <th>Authorization</th>
          <th>Expiry</th>
          <th>Last Drive Timestamp</th>
          <th>Delete</th>
        </tr>
      </thead>
      <tbody id="driver-table-body">
        <tr>
          <td colspan="6" style="text-align:center;">Loading drivers...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCx80ZdLLV06ugSQZjIksldAdeBxQsOuMA",
      authDomain: "authodrive.firebaseapp.com",
      projectId: "authodrive",
      storageBucket: "authodrive.firebasestorage.app",
      messagingSenderId: "957416208887",
      appId: "1:957416208887:web:e436118e5c531458b2d6f2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const driverTableBody = document.getElementById("driver-table-body");

    onSnapshot(collection(db, "drivers"), (snapshot) => {
      const activeDrivers = snapshot.docs
        .map(doc => ({ id: doc.id, ...doc.data() }))
        .filter(driver => driver.Status === "Active");

      if (activeDrivers.length === 0) {
        driverTableBody.innerHTML = `
          <tr>
            <td colspan="6" style="text-align:center;">No active drivers found.</td>
          </tr>`;
        return;
      }

      driverTableBody.innerHTML = "";

      activeDrivers.forEach(d => {
        let timestamp = "N/A";
        if (d.lastDriveTimestamp && typeof d.lastDriveTimestamp.toDate === "function") {
          timestamp = d.lastDriveTimestamp.toDate().toLocaleString();
        }

        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${d["Name"] || "N/A"}</td>
          <td>${d["License No"] || "N/A"}</td>
          <td>${d["Authorization"] || "N/A"}</td>
          <td>${d["Date of Expiry"] || "N/A"}</td>
          <td>${timestamp}</td>
          <td>
            <button title="Delete Driver" class="action-btn delete-btn" data-id="${d.id}">
              <i class="bi bi-trash"></i> Delete
            </button>
          </td>
        `;
        driverTableBody.appendChild(row);
      });
    });

    // Event listener for the delete button
    driverTableBody.addEventListener("click", async (e) => {
      const target = e.target.closest("button.delete-btn");
      if (!target) return;

      const driverId = target.dataset.id;
      if (!driverId) return;

      if (confirm("Are you sure you want to delete this driver?")) {
        const driverDocRef = doc(db, "drivers", driverId);
        await updateDoc(driverDocRef, { Status: "Discarded" });
      }
    });
  </script>
</body>
</html>
